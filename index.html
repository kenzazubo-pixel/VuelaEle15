<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VuelaEle — Aula gamificada ELE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',system-ui,sans-serif;background:#0F1B3D;color:#E8ECF5;min-height:100vh}
.app{min-height:100vh;display:flex;flex-direction:column}
header{background:#0F1B3D;border-bottom:1px solid rgba(201,168,76,.3);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:30px;font-weight:900;font-family:'Playfair Display',serif;color:#fff;cursor:pointer;display:flex;align-items:center;gap:10px}
.logo span{color:#C9A84C}
main{flex:1;max-width:1100px;margin:0 auto;width:100%;padding:24px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:12px;border:none;font-weight:800;font-size:13px;cursor:pointer;transition:all .15s;font-family:'Nunito',sans-serif}
.btn-green{background:#58CC02;color:#fff;border-bottom:4px solid #46a302}
.btn-green:hover{background:#61E002}
.btn-blue{background:#1CB0F6;color:#fff;border-bottom:4px solid #1899D6}
.btn-orange{background:#FF9600;color:#fff;border-bottom:4px solid #E08200}
.btn-red{background:#FF4B4B;color:#fff;border-bottom:4px solid #D63E3E}
.btn-white{background:#fff;color:#4B4B4B;border-bottom:4px solid #E5E5E5}
.btn-ghost{background:rgba(255,255,255,.08);color:#C9A84C;border:1px solid rgba(201,168,76,.3)}
.btn-gold{background:#C9A84C;color:#0F1B3D;border-bottom:4px solid #A88830;font-weight:900}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-lg{padding:12px 24px;font-size:15px}
.section-label{font-size:12px;text-transform:uppercase;letter-spacing:.3em;color:#C9A84C;margin-bottom:6px}
.section-title{font-size:26px;font-weight:900;color:#fff;font-family:'Playfair Display',serif;margin-bottom:4px}
.section-sub{font-size:16px;color:rgba(201,211,232,.6);margin-bottom:28px}
.tab-nav{display:flex;gap:4px;margin-bottom:20px;background:rgba(15,27,61,.4);border-radius:14px;padding:4px}
.tab-btn{flex:1;padding:12px 16px;border-radius:10px;border:none;font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;background:none;color:rgba(201,211,232,.6);transition:.15s;font-family:'Nunito',sans-serif}
.tab-btn.active{background:#C9A84C;color:#0F1B3D}
.card{background:rgba(30,58,95,.5);border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:20px}
.input{width:100%;padding:12px 16px;border-radius:12px;border:2px solid #E5E5E5;font-size:14px;font-weight:700;color:#3C3C3C;outline:none;transition:.15s;font-family:'Nunito',sans-serif;background:#fff}
.input:focus{border-color:#1CB0F6;box-shadow:0 0 0 3px rgba(28,176,246,.15)}
.textarea{width:100%;padding:12px 16px;border-radius:12px;border:2px solid #E5E5E5;font-size:14px;color:#3C3C3C;outline:none;resize:vertical;transition:.15s;font-family:'Nunito',sans-serif;background:#fff}
.label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.15em;color:#6B6B6B;margin-bottom:6px;display:block}
.form-row{margin-bottom:16px}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.back-link{display:inline-flex;align-items:center;gap:6px;color:#C9A84C;font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;margin-bottom:20px;background:none;border:none;padding:0}
.back-link:hover{color:#fff}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.game-card{background:rgba(30,58,95,.6);border:1px solid rgba(46,204,113,.2);border-radius:16px;overflow:hidden;transition:all .2s;cursor:pointer}
.game-card:hover{border-color:rgba(46,204,113,.6);transform:translateY(-2px)}
.game-card-top{padding:16px 16px 12px;display:flex;align-items:flex-start;justify-content:space-between}
.game-emoji{font-size:42px}
.game-type-badge{font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:rgba(88,204,2,.8);font-weight:900}
.game-title{padding:0 16px 12px;font-size:17px;font-weight:900;color:#fff;line-height:1.3}
.game-subject{padding:0 16px 12px;font-size:13px;color:rgba(201,211,232,.5);font-style:italic}
.game-actions{border-top:1px solid rgba(88,204,2,.1);display:flex}
.game-action{flex:1;padding:13px;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;background:none;border:none;cursor:pointer;color:rgba(88,204,2,.8);transition:all .15s}
.game-action:hover{background:rgba(88,204,2,.1);color:#58CC02}
.game-sep{width:1px;background:rgba(88,204,2,.1)}
.tag{display:inline-flex;align-items:center;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.1em}
.tag-blue{background:#DDF4FF;color:#0E6E9A;border:1px solid rgba(28,176,246,.3)}
.tag-green{background:#D7FFB8;color:#3C8200;border:1px solid rgba(88,204,2,.3)}
.tag-orange{background:#FFE8C7;color:#A06400;border:1px solid rgba(255,150,0,.3)}
.tag-amber{background:#FFF3CD;color:#856404;border:1px solid rgba(201,168,76,.4)}
.tag-red{background:#FFE0E0;color:#A02020;border:1px solid rgba(255,75,75,.3)}
.empty-state{padding:40px;text-align:center;border:2px dashed rgba(88,204,2,.3);border-radius:16px}
.empty-icon{font-size:64px;margin-bottom:16px}
.empty-title{font-size:24px;font-weight:900;color:#fff;margin-bottom:10px}
.empty-desc{font-size:16px;color:rgba(201,211,232,.6);margin-bottom:24px}
.player-wrap{background:#fff;border-radius:16px;padding:24px;color:#3C3C3C;max-width:700px;margin:0 auto}
.player-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.player-title{font-size:20px;font-weight:900;color:#3C3C3C;margin-bottom:4px}
.player-sub{font-size:13px;color:#6B6B6B;font-weight:700}
.progress-bar{height:12px;border-radius:6px;background:#E5E5E5;overflow:hidden;margin-bottom:20px}
.progress-fill{height:100%;border-radius:6px;background:#58CC02;transition:width .5s}
.question-text{font-size:22px;font-weight:900;color:#3C3C3C;text-align:center;margin:20px 0;line-height:1.3}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.option-btn{padding:16px;border-radius:14px;border:none;font-size:14px;font-weight:900;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:10px;border-bottom:4px solid;font-family:'Nunito',sans-serif}
.option-letter{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0}
.tf-btns{display:flex;justify-content:center;gap:20px;margin:24px 0}
.tf-btn{width:160px;height:140px;border-radius:16px;border:none;font-size:20px;font-weight:900;color:#fff;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border-bottom:6px solid;font-family:'Nunito',sans-serif}
.anagram-tile{width:44px;height:52px;border-radius:12px;background:#FFE8C7;border-bottom:4px solid #FF9600;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#A06400;cursor:pointer;transition:.15s}
.anagram-tile:hover{transform:translateY(-4px)}
.anagram-tile.used{opacity:.3;cursor:not-allowed}
.answer-area{min-height:60px;padding:12px;border-radius:14px;background:#DDF4FF;border:2px dashed #1CB0F6;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;margin-bottom:12px}
.letter-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;margin:12px 0}
.letter-btn{width:34px;height:34px;border-radius:8px;border:2px solid #E5E5E5;background:#F7F9FA;font-weight:900;font-size:12px;cursor:pointer;color:#1CB0F6;transition:.15s;font-family:'Nunito',sans-serif}
.letter-btn:hover:not(:disabled){background:#DDF4FF;border-color:#1CB0F6}
.letter-btn.good{background:#D7FFB8;border-color:#58CC02;color:#3C8200}
.letter-btn.bad{background:#FFE0E0;border-color:#FF4B4B;color:#A02020}
.word-display{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:16px 0}
.word-cell{width:40px;height:50px;border-radius:8px 8px 0 0;background:#FFE8C7;border-bottom:4px solid #FF9600;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#A06400}
.match-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.match-card{aspect-ratio:3/4;border-radius:14px;border:none;cursor:pointer;font-weight:900;font-size:13px;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:8px;text-align:center;border-bottom:4px solid;font-family:'Nunito',sans-serif}
.ws-grid-wrap{display:inline-grid;gap:3px;padding:16px;background:#fff;border-radius:14px;border:2px solid #E5E5E5;user-select:none}
.ws-cell{width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;border-radius:6px;border:1px solid #E5E5E5;cursor:pointer;transition:.1s;color:#0F1B3D;background:#F7F9FA;font-family:monospace}
.ws-cell.sel{background:#FFE8C7;border-color:#FF9600}
.order-area{min-height:56px;padding:12px;border-radius:14px;background:#DDF4FF;border:2px dashed #1CB0F6;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;margin-bottom:12px}
.order-token{padding:8px 16px;border-radius:10px;font-size:14px;font-weight:900;cursor:pointer;transition:.15s;border-bottom:3px solid;background:#FFE8C7;border-color:#FF9600;color:#A06400;font-family:'Nunito',sans-serif}
.order-token:hover{transform:translateY(-2px)}
.order-token.used{opacity:.3;cursor:not-allowed}
.order-placed{padding:8px 16px;border-radius:10px;font-size:14px;font-weight:900;cursor:pointer;background:#fff;border-bottom:3px solid #1CB0F6;color:#0E6E9A;font-family:'Nunito',sans-serif}
.cw-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.cw-num{font-weight:900;color:#1CB0F6;width:24px;flex-shrink:0}
.cw-clue{flex:1;font-size:13px;font-weight:700;color:#3C3C3C}
.cw-input{width:140px;padding:8px 12px;border-radius:10px;border:2px solid #E5E5E5;font-family:monospace;font-weight:900;font-size:14px;text-transform:uppercase;color:#3C3C3C;outline:none}
.cw-input:focus{border-color:#1CB0F6}
.fill-sentence{font-size:22px;font-weight:900;color:#3C3C3C;text-align:center;line-height:2;margin:20px 0}
.fill-input{border:none;border-bottom:4px solid #58CC02;background:transparent;font-size:22px;font-weight:900;color:#3C8200;width:160px;text-align:center;outline:none;padding:4px;font-family:'Nunito',sans-serif}
.cat-pool{display:flex;flex-wrap:wrap;gap:8px;padding:16px;background:#F7F9FA;border-radius:12px;min-height:60px;margin-bottom:16px}
.cat-chip{padding:8px 14px;border-radius:10px;font-size:13px;font-weight:900;cursor:pointer;border:2px solid #E5E5E5;background:#fff;color:#3C3C3C;transition:.15s}
.cat-chip.selected{background:#FF9600;border-color:#E08200;color:#fff}
.cat-bins{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:12px}
.cat-bin{padding:16px;border-radius:14px;border:2px dashed #E5E5E5;min-height:100px;transition:.15s;cursor:pointer}
.cat-bin.droppable{border-color:#58CC02;background:#D7FFB8}
.cat-bin-title{font-size:14px;font-weight:900;margin-bottom:8px}
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.mode-card{padding:20px;border-radius:16px;border:2px solid rgba(201,168,76,.2);background:rgba(15,27,61,.6);cursor:pointer;transition:.2s;text-align:left}
.mode-card:hover{border-color:#C9A84C;transform:translateY(-2px)}
.mode-icon{font-size:36px;margin-bottom:8px;display:block}
.mode-title{font-size:16px;font-weight:900;margin-bottom:4px;color:#fff}
.mode-desc{font-size:12px;line-height:1.5;color:rgba(201,211,232,.65)}
.method-card{padding:20px;border-radius:16px;border:2px solid rgba(201,168,76,.2);background:rgba(15,27,61,.6);cursor:pointer;transition:.2s}
.method-card:hover{border-color:#C9A84C;background:rgba(30,58,95,.6)}
.station-tab{padding:8px 18px;border-radius:10px;border:2px solid;font-size:13px;font-weight:900;text-transform:uppercase;cursor:pointer;transition:.15s;background:none;font-family:'Nunito',sans-serif}
.infog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.infog-card{border-radius:14px;overflow:hidden;border:2px solid rgba(201,168,76,.2);background:rgba(15,27,61,.6);cursor:pointer;transition:.2s}
.infog-card:hover{border-color:#C9A84C}
.infog-thumb{height:90px;background:rgba(201,168,76,.1);display:flex;align-items:center;justify-content:center;font-size:32px}
.infog-info{padding:10px 12px}
.infog-title{font-size:13px;font-weight:900;color:#fff;margin-bottom:2px}
.infog-tags{font-size:10px;color:rgba(201,168,76,.7);text-transform:uppercase;letter-spacing:.1em}
.type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-bottom:20px}
.type-btn{padding:10px 8px;border-radius:12px;border:2px solid #E5E5E5;background:#F7F9FA;cursor:pointer;text-align:center;transition:.15s;font-size:11px;font-weight:900;color:#3C3C3C;font-family:'Nunito',sans-serif}
.type-btn:hover,.type-btn.active{border-color:#1CB0F6;background:#1CB0F6;color:#fff}
.type-btn-emoji{font-size:20px;display:block;margin-bottom:4px}
.quiz-q{background:#F7F9FA;border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid #E5E5E5}
.opts-grid-edit{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.opt-row{display:flex;align-items:center;gap:8px}
.pair-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.remove-btn{background:#FFE0E0;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;font-weight:900;color:#D63E3E}
.remove-btn:hover{background:#FF4B4B;color:#fff}
.divider{border:none;border-top:1px solid #E5E5E5;margin:16px 0}
.editor-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid #E5E5E5}
.editor-wrap{background:#fff;border-radius:16px;padding:24px;color:#3C3C3C}
.student-portal{background:#fff;border-radius:20px;padding:40px;color:#3C3C3C;max-width:640px;margin:0 auto}
.pin-input{width:100%;padding:24px;font-size:60px;font-weight:900;text-align:center;letter-spacing:.4em;border:4px solid #C9A84C;border-radius:16px;background:#fff;color:#0F1B3D;outline:none;font-family:monospace;margin:16px 0}
.pin-input:focus{box-shadow:0 0 0 4px rgba(201,168,76,.25)}
.player-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#DDF4FF;border:1px solid rgba(28,176,246,.4);border-radius:10px;font-size:13px;font-weight:900;color:#0E6E9A;margin:3px}
.lobby-pin{font-size:64px;font-weight:900;letter-spacing:.3em;color:#FF9600;text-align:center;margin:16px 0;font-family:monospace}
.results-table{width:100%;border-collapse:collapse}
.results-table th{text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:#6B6B6B;border-bottom:2px solid #E5E5E5}
.results-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid #E5E5E5}
.notification{position:fixed;top:70px;right:20px;padding:12px 20px;border-radius:12px;font-weight:900;font-size:14px;z-index:999;background:#D7FFB8;color:#3C8200;border:2px solid #58CC02}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:9999}
.confetti-piece{position:absolute;top:-10px;width:8px;height:12px;border-radius:2px;animation:cfFall 3s linear forwards}
.flip-panel{padding:20px;border-radius:16px;border:1px solid rgba(201,168,76,.2);background:rgba(15,27,61,.6)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes cfFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
select.input{appearance:auto}
@media(max-width:600px){.mode-grid,.form-2col{grid-template-columns:1fr}.options-grid{grid-template-columns:1fr}.tf-btns{flex-wrap:wrap}}

.lang-selector{display:flex;align-items:center;gap:4px}
.lang-btn{padding:4px 8px;border-radius:8px;border:2px solid transparent;background:transparent;cursor:pointer;font-size:18px;transition:all .15s;line-height:1}
.lang-btn:hover{background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.3)}
.lang-btn.active{background:rgba(201,168,76,.2);border-color:#C9A84C}
[dir="rtl"] .logo{flex-direction:row-reverse}
[dir="rtl"] .back-link{flex-direction:row-reverse}
</style>
</head>
<body>
<div class="app">

function uid(){return Math.random().toString(36).slice(2,9)}
function pin4(){return String(1000+Math.floor(Math.random()*9000))}
function notify(msg,ok=true){const n=document.getElementById("notif-el");n.textContent=msg;n.style.background=ok?"#D7FFB8":"#FFE8C7";n.style.color=ok?"#3C8200":"#A06400";n.style.borderColor=ok?"#58CC02":"#FF9600";n.style.display="block";clearTimeout(n._t);n._t=setTimeout(()=>n.style.display="none",3000)}
function confetti(){const w=document.getElementById("confetti-el");w.style.display="block";w.innerHTML="";const cols=["#58CC02","#1CB0F6","#FF9600","#CE82FF","#FF4B4B"];for(let i=0;i<60;i++){const p=document.createElement("div");p.className="confetti-piece";p.style.cssText=`left:${Math.random()*100}%;animation-delay:${Math.random()*1.5}s;animation-duration:${2+Math.random()*2}s;background:${cols[i%5]};transform:rotate(${Math.random()*360}deg)`;w.appendChild(p)}setTimeout(()=>w.style.display="none",4500)}
function goHome(){S.view="role";S.pFinished=false;S.pState={};render()}

function render(){
  const app=document.getElementById("app");
  const hr=document.getElementById("hdr-right");
  hr.innerHTML=S.role==="teacher"&&!["play","role"].includes(S.view)?`<button class="btn btn-ghost btn-sm" onclick="S.view='results';render()">${t("results")}</button>`:"";
  const v={role:vRole,teacher:vTeacher,student:vStudent,editor:vEditor,modepick:vModePick,livelobby:vLiveLobby,play:vPlay,results:vResults,prep:vPrep,flipquiz:vFlipQuiz,flipreflection:vFlipReflection};
  app.innerHTML=(v[S.view]||vRole)();
  // Marcar idioma activo
  ["es","fr","en","ar"].forEach(l=>{const btn=document.getElementById("lang-"+l);if(btn){btn.classList.toggle("active",S.lang===l)}});
  // Dirección RTL para árabe
  document.documentElement.dir=S.lang==="ar"?"rtl":"ltr";
}

function vTeacher(){

          <button onclick="S.fichaZoom=100;applyZoom()" style="padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(255,255,255,.4);font-size:12px;cursor:pointer">Reset</button>

function abrirFicha(idx){
  S.fichaAbierta=idx;
  S.fichaZoom=100;
  render();
  // Listener ESC
  document.onkeydown=e=>{
    if(e.key==="Escape")cerrarFicha();
    if(e.key==="ArrowRight")navFicha(1);
    if(e.key==="ArrowLeft")navFicha(-1);
  };
}

function cerrarFicha(){
  S.fichaAbierta=null;
  S.fichaZoom=100;
  document.onkeydown=null;
  render();
}

function navFicha(dir){
  const total=S.infographies.length;
  if(total===0)return;
  S.fichaAbierta=((S.fichaAbierta||0)+dir+total)%total;
  S.fichaZoom=100;
  render();
}

function zoomFicha(dir){
  S.fichaZoom=Math.min(200,Math.max(30,(S.fichaZoom||100)+dir*20));
  applyZoom();
}

function applyZoom(){
  const img=document.getElementById("ficha-img");
  if(img){img.style.maxWidth=(S.fichaZoom||100)+"%";img.style.maxHeight="none"}
  const span=document.querySelector("#ficha-img-wrap+div span");
  render();
}

function toggleFullscreen(){
  const el=document.getElementById("ficha-img-wrap");
  if(!el)return;
  if(!document.fullscreenElement){
    el.requestFullscreen?.()
      .catch(()=>{
        // fallback: abrir imagen en pestaña nueva
        const img=S.infographies[S.fichaAbierta]?.src;
        if(img){const w=window.open();w.document.write(`<img src="${img}" style="max-width:100%;max-height:100vh">`)}
      });
  } else {
    document.exitFullscreen?.();
  }
}

function eliminarFicha(idx){
  if(!confirm("¿Eliminar esta ficha?"))return;
  S.infographies.splice(idx,1);
  save();
  notify("Ficha eliminada");
  render();
}

function saveReflectionQ(){
  const q=document.getElementById("flip-reflection-q")?.value?.trim();
  if(!q){notify("Escribe la pregunta primero",false);return}
  const cfg=JSON.parse(localStorage.getItem("gse.v3.flip")||"{}");
  cfg.reflectionQ=q;
  localStorage.setItem("gse.v3.flip",JSON.stringify(cfg));
  notify("Pregunta de reflexión guardada ✓");
  render();
}

function flipQuizAdd(){
  const q=document.getElementById("fq-question")?.value?.trim();
  if(!q){notify("Escribe el enunciado primero",false);return}
  const type=S.flipQType||"truefalse";
  const cfg=JSON.parse(localStorage.getItem("gse.v3.flip")||"{}");
  if(!cfg.quiz)cfg.quiz=[];
  if(type==="truefalse"){
    const sel=document.querySelector('input[name="tf-answer"]:checked');
    if(!sel){notify("Marca Verdadero o Falso",false);return}
    cfg.quiz.push({q,type:"truefalse",correct:sel.value==="true"});
  } else {
    const answer=document.getElementById("fq-answer")?.value?.trim();
    if(!answer){notify("Escribe la respuesta correcta",false);return}
    cfg.quiz.push({q,type:"fillblank",answer});
  }
  localStorage.setItem("gse.v3.flip",JSON.stringify(cfg));
  notify("Pregunta añadida ✓");
  document.getElementById("fq-question").value="";
  const ans=document.getElementById("fq-answer");if(ans)ans.value="";
  const radios=document.querySelectorAll('input[name="tf-answer"]');radios.forEach(r=>r.checked=false);
  render();
}

function flipQuizRemove(i){
  const cfg=JSON.parse(localStorage.getItem("gse.v3.flip")||"{}");
  if(!cfg.quiz)return;
  cfg.quiz.splice(i,1);
  localStorage.setItem("gse.v3.flip",JSON.stringify(cfg));
  notify("Pregunta eliminada");
  render();
}

function uploadInfog(input){
  const f=input.files[0];if(!f)return;
  const title=prompt("Título para esta ficha:")||f.name;
  const level=(prompt("Nivel MCER (A1/A2/B1/B2/C1/C2):")||"").toUpperCase();
  const tags=prompt("Etiquetas (ej: gramática, vocabulario):")||"";
  const r=new FileReader();
  r.onload=()=>{S.infographies.push({id:uid(),title,level,tags,src:r.result});save();render();notify("Ficha subida ✓")};
  r.readAsDataURL(f);
}

function renderAsientos(cls,ci){

  const assigned=Object.values(seats);
  const unassigned=students.filter(n=>!assigned.includes(n));

  return`<div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <div style="font-size:13px;font-weight:900;color:rgba(201,211,232,.6)">Filas:</div>

      </div>
    </div>`:""}
  </div>`;

function guardarAsignacion(ci){
  const tipo=S.segTipo||"juego";
  const dest=S.segDest||"clase";
  let titulo="";
  let destinatarios=[];

  // Obtener título del recurso
  if(tipo==="juego"){
    const id=document.getElementById("seg-recurso")?.value;
    if(!id){notify("Selecciona un juego",false);return}
    const act=S.activities.find(a=>a.id===id);
    titulo=act?`${GAME_META[act.type].emoji} ${act.title}`:"Juego";
  } else if(tipo==="ficha"){
    const id=document.getElementById("seg-recurso")?.value;
    if(!id){notify("Selecciona una ficha",false);return}
    const fic=S.infographies.find(f=>f.id===id);
    titulo=fic?`📄 ${fic.title}`:"Ficha";
  } else {
    titulo=document.getElementById("seg-recurso")?.value?.trim();
    if(!titulo){notify("Escribe el nombre de la actividad",false);return}
  }

  // Obtener destinatarios
  const cls=JSON.parse(localStorage.getItem("gse.v3.classes")||"[]")[ci];
  const students=cls?.students||[];
  if(dest==="clase"){
    destinatarios=(students).map(s=>s.name||s);
  } else if(dest==="subgrupo"){
    destinatarios=Array.from(document.querySelectorAll('input[name="seg-sub"]:checked')).map(c=>c.value);
    if(destinatarios.length===0){notify("Selecciona al menos un alumno",false);return}
  } else {
    const al=document.getElementById("seg-alumno")?.value;
    if(!al){notify("Selecciona un alumno",false);return}
    destinatarios=[al];
  }

  const nueva={
    titulo,tipo,dest,destinatarios,
    instrucciones:document.getElementById("seg-instrucciones")?.value?.trim()||"",
    fecha:document.getElementById("seg-fecha")?.value||"",
    prioridad:document.getElementById("seg-prioridad")?.value||"normal",
    completada:false,
    creada:new Date().toLocaleDateString(),
  };

  const allCls=JSON.parse(localStorage.getItem("gse.v3.classes")||"[]");
  if(!allCls[ci].asignaciones)allCls[ci].asignaciones=[];
  allCls[ci].asignaciones.unshift(nueva);
  localStorage.setItem("gse.v3.classes",JSON.stringify(allCls));
  S.activities=JSON.parse(localStorage.getItem("gse.v3.acts")||"[]");
  S.segMode="lista";
  notify("¡Tarea asignada! ✓");
  render();
}

function toggleAsigEstado(ci,i){
  const cls=JSON.parse(localStorage.getItem("gse.v3.classes")||"[]");
  cls[ci].asignaciones[i].completada=!cls[ci].asignaciones[i].completada;
  localStorage.setItem("gse.v3.classes",JSON.stringify(cls));
  render();
}

function eliminarAsignacion(ci,i){
  if(!confirm("¿Eliminar esta asignación?"))return;
  const cls=JSON.parse(localStorage.getItem("gse.v3.classes")||"[]");
  cls[ci].asignaciones.splice(i,1);
  localStorage.setItem("gse.v3.classes",JSON.stringify(cls));
  notify("Asignación eliminada");
  render();
}

          </div>`;

function saveCustomNEE(){
  const titulo=document.getElementById("nee-titulo")?.value?.trim();
  if(!titulo){notify("Escribe un título",false);return}
  const emoji=document.getElementById("nee-emoji")?.value?.trim()||"📌";
  const desc=document.getElementById("nee-desc")?.value?.trim()||"";
  const fichas=(document.getElementById("nee-fichas")?.value||"").split("\n").map(l=>l.trim()).filter(Boolean);
  const ejercicios=(document.getElementById("nee-ejercicios")?.value||"").split("\n").map(l=>l.trim()).filter(Boolean);
  const examenes=(document.getElementById("nee-examenes")?.value||"").split("\n").map(l=>l.trim()).filter(Boolean);
  const id="custom_"+uid();
  const newNEE={id,titulo,emoji,descripcion:desc,color:"#C9A84C",adaptaciones:{fichas,ejercicios,examenes}};
  const custom=JSON.parse(localStorage.getItem("gse.v3.customNEEs")||"[]");
  custom.push(newNEE);
  localStorage.setItem("gse.v3.customNEEs",JSON.stringify(custom));
  S.showNEEForm=false;
  S.selectedNEE=id;
  S.neeTab="fichas";
  notify("NEE creada ✓");
  render();
}

function deleteCustomNEE(id){
  if(!confirm("¿Eliminar esta NEE personalizada?"))return;
  const custom=JSON.parse(localStorage.getItem("gse.v3.customNEEs")||"[]");
  const filtered=custom.filter(n=>n.id!==id);
  localStorage.setItem("gse.v3.customNEEs",JSON.stringify(filtered));
  S.selectedNEE=null;
  notify("NEE eliminada");
  render();
}

function toggleNEETask(neeId,tarea){
  const cfg=JSON.parse(localStorage.getItem("gse.v3.flip")||"{}");
  const key=`nee_${neeId}_${tarea.replace(/\s+/g,"_")}`;
  cfg[key]=!cfg[key];
  localStorage.setItem("gse.v3.flip",JSON.stringify(cfg));
  render();
}


function addStudentFull(ci){
  const name=document.getElementById("stu-name")?.value?.trim();
  const level=document.getElementById("stu-level")?.value||"";
  const notes=document.getElementById("stu-notes")?.value?.trim()||"";
  const avatar=S.selectedAvatar||"🧑‍🎓";
  if(!name){notify("Escribe el nombre del alumno",false);return}
  const cls=JSON.parse(localStorage.getItem("gse.v3.classes")||"[]");
  if(!cls[ci].students)cls[ci].students=[];
  cls[ci].students.push({name,level,notes,avatar});
  localStorage.setItem("gse.v3.classes",JSON.stringify(cls));
  S.selectedAvatar=null;
  // Limpiar inputs
  ["stu-name","stu-notes"].forEach(id=>{const el=document.getElementById(id);if(el)el.value=""});
  const sel=document.getElementById("stu-level");if(sel)sel.value="";
  notify("Alumno añadido ✓");
  render();
}

function removeStudent(ci,si){
  const cls=JSON.parse(localStorage.getItem("gse.v3.classes")||"[]");
  cls[ci].students.splice(si,1);
  localStorage.setItem("gse.v3.classes",JSON.stringify(cls));
  notify("Alumno eliminado");
  render();
}

function updateSeatGrid(ci,field,val){
  const cls=JSON.parse(localStorage.getItem("gse.v3.classes")||"[]");
  if(field==="rows")cls[ci].seatRows=val;
  else cls[ci].seatCols=val;
  localStorage.setItem("gse.v3.classes",JSON.stringify(cls));
  render();
}

function seatClick(key,ci){
  S.seatPickKey=key;
  render();
}

function assignSeat(key,ci,name,prev){
  const cls=JSON.parse(localStorage.getItem("gse.v3.classes")||"[]");
  if(!cls[ci].seats)cls[ci].seats={};
  // Si el alumno ya tiene asiento, liberarlo
  Object.keys(cls[ci].seats).forEach(k=>{if(cls[ci].seats[k]===name)delete cls[ci].seats[k]});
  cls[ci].seats[key]=name;
  localStorage.setItem("gse.v3.classes",JSON.stringify(cls));
  S.seatPickKey=null;
  render();
}

function clearSeat(key,ci){
  const cls=JSON.parse(localStorage.getItem("gse.v3.classes")||"[]");
  if(cls[ci].seats)delete cls[ci].seats[key];
  localStorage.setItem("gse.v3.classes",JSON.stringify(cls));
  render();
}

function clearAllSeats(ci){
  if(!confirm("¿Limpiar todo el mapa de asientos?"))return;
  const cls=JSON.parse(localStorage.getItem("gse.v3.classes")||"[]");
  cls[ci].seats={};
  localStorage.setItem("gse.v3.classes",JSON.stringify(cls));

}

function saveSeguimiento(ci,name,field,val){
  const cls=JSON.parse(localStorage.getItem("gse.v3.classes")||"[]");
  if(!cls[ci].seguimiento)cls[ci].seguimiento={};
  if(!cls[ci].seguimiento[name])cls[ci].seguimiento[name]={};
  cls[ci].seguimiento[name][field]=val;
  localStorage.setItem("gse.v3.classes",JSON.stringify(cls));
}

function addConsejo(){
  const icon=document.getElementById("tip-icon")?.value?.trim()||"💡";
  const titulo=document.getElementById("tip-titulo")?.value?.trim();

function deleteConsejo(i){

  consejos.splice(i,1);
  localStorage.setItem("gse.v3.consejos",JSON.stringify(consejos));

}

function toggleNEE(ci,name,catId){
  const cls=JSON.parse(localStorage.getItem("gse.v3.classes")||"[]");
  if(!cls[ci].nee)cls[ci].nee={};
  if(!cls[ci].nee[name])cls[ci].nee[name]={categorias:[],notas:""};
  const arr=cls[ci].nee[name].categorias;
  const idx=arr.indexOf(catId);
  if(idx>=0)arr.splice(idx,1);else arr.push(catId);
  localStorage.setItem("gse.v3.classes",JSON.stringify(cls));
  render();
}

function saveNEE(ci,name,field,val){
  const cls=JSON.parse(localStorage.getItem("gse.v3.classes")||"[]");
  if(!cls[ci].nee)cls[ci].nee={};
  if(!cls[ci].nee[name])cls[ci].nee[name]={categorias:[],notas:""};
  cls[ci].nee[name][field]=val;
  localStorage.setItem("gse.v3.classes",JSON.stringify(cls));
}

function changeEdType(t){S.edType=t;S.edData=defData(t);document.getElementById("ed-fields").innerHTML=edFields(t);document.querySelectorAll(".type-btn").forEach(b=>{b.classList.remove("active");if(b.textContent.includes(GAME_META[t].label))b.classList.add("active")})}

function edFields(type){
  const d=S.edData;
  if(type==="quiz")return`<div>${(d.questions||[]).map((q,i)=>`<div class="quiz-q"><div style="display:flex;gap:8px;margin-bottom:8px"><input class="input" placeholder="Pregunta ${i+1}" value="${q.q}" oninput="S.edData.questions[${i}].q=this.value" style="flex:1"><button class="remove-btn" onclick="S.edData.questions.splice(${i},1);document.getElementById('ed-fields').innerHTML=edFields('quiz')">✕</button></div><div class="opts-grid-edit">${(q.opts||[]).map((o,j)=>`<div class="opt-row"><input type="radio" name="c${i}" ${q.correct===j?"checked":""} onchange="S.edData.questions[${i}].correct=${j}"><input class="input" value="${o}" oninput="S.edData.questions[${i}].opts[${j}]=this.value" placeholder="${"ABCD"[j]}"></div>`).join("")}</div></div>`).join("")}<button class="btn btn-blue" onclick="S.edData.questions.push({q:'',opts:['','','',''],correct:0});document.getElementById('ed-fields').innerHTML=edFields('quiz')">+ Pregunta</button></div>`;
  if(type==="match")return`<div>${(d.pairs||[]).map((p,i)=>`<div class="pair-row"><input class="input" value="${p.a}" oninput="S.edData.pairs[${i}].a=this.value" placeholder="Término A" style="flex:1"><span style="color:#AFAFAF;font-weight:900;font-size:16px;flex-shrink:0">↔</span><input class="input" value="${p.b}" oninput="S.edData.pairs[${i}].b=this.value" placeholder="Término B" style="flex:1"><button class="remove-btn" onclick="S.edData.pairs.splice(${i},1);document.getElementById('ed-fields').innerHTML=edFields('match')">✕</button></div>`).join("")}<button class="btn btn-green" onclick="S.edData.pairs.push({a:'',b:''});document.getElementById('ed-fields').innerHTML=edFields('match')">+ Pareja</button></div>`;
  if(type==="anagram"||type==="hangman")return`<div>${(d.words||[]).map((w,i)=>`<div class="pair-row"><input class="input" value="${w.word}" oninput="S.edData.words[${i}].word=this.value.toUpperCase()" placeholder="PALABRA" style="flex:1"><input class="input" value="${w.hint}" oninput="S.edData.words[${i}].hint=this.value" placeholder="Pista" style="flex:2"><button class="remove-btn" onclick="S.edData.words.splice(${i},1);document.getElementById('ed-fields').innerHTML=edFields('${type}')">✕</button></div>`).join("")}<button class="btn btn-orange" onclick="S.edData.words.push({word:'',hint:''});document.getElementById('ed-fields').innerHTML=edFields('${type}')">+ Palabra</button></div>`;
  if(type==="truefalse")return`<div>${(d.items||[]).map((it,i)=>`<div class="pair-row"><input class="input" value="${it.s}" oninput="S.edData.items[${i}].s=this.value" placeholder="Afirmación" style="flex:1"><select class="input" style="width:140px" onchange="S.edData.items[${i}].a=this.value==='true'"><option value="true" ${it.a?"selected":""}>Verdadero</option><option value="false" ${!it.a?"selected":""}>Falso</option></select><button class="remove-btn" onclick="S.edData.items.splice(${i},1);document.getElementById('ed-fields').innerHTML=edFields('truefalse')">✕</button></div>`).join("")}<button class="btn btn-blue" onclick="S.edData.items.push({s:'',a:true});document.getElementById('ed-fields').innerHTML=edFields('truefalse')">+ Afirmación</button></div>`;
  if(type==="fillblank")return`<p style="font-size:12px;color:#6B6B6B;margin-bottom:10px">Usa ___ para el hueco.</p><div>${(d.items||[]).map((it,i)=>`<div class="pair-row"><input class="input" value="${it.sentence}" oninput="S.edData.items[${i}].sentence=this.value" placeholder="Frase con ___" style="flex:2"><input class="input" value="${it.answer}" oninput="S.edData.items[${i}].answer=this.value" placeholder="Respuesta" style="flex:1"><button class="remove-btn" onclick="S.edData.items.splice(${i},1);document.getElementById('ed-fields').innerHTML=edFields('fillblank')">✕</button></div>`).join("")}<button class="btn btn-blue" onclick="S.edData.items.push({sentence:'',answer:''});document.getElementById('ed-fields').innerHTML=edFields('fillblank')">+ Frase</button></div>`;
  if(type==="categorize")return`<div>${(d.cats||[]).map((c,i)=>`<div style="background:#F7F9FA;border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid #E5E5E5"><div style="display:flex;gap:8px;margin-bottom:8px"><input class="input" value="${c.name}" oninput="S.edData.cats[${i}].name=this.value" placeholder="Categoría" style="flex:1"><button class="remove-btn" onclick="S.edData.cats.splice(${i},1);document.getElementById('ed-fields').innerHTML=edFields('categorize')">✕</button></div><input class="input" value="${c.items.join(', ')}" oninput="S.edData.cats[${i}].items=this.value.split(',').map(s=>s.trim()).filter(Boolean)" placeholder="Elementos separados por coma"></div>`).join("")}<button class="btn btn-green" onclick="S.edData.cats.push({name:'',items:[]});document.getElementById('ed-fields').innerHTML=edFields('categorize')">+ Categoría</button></div>`;
  const listTypes={wordsearch:{f:"words",ph:"PALABRA",upper:true},roulette:{f:"options",ph:"Opción",upper:false},ordersentence:{f:"sentences",ph:"Frase completa",upper:false}};

function vFlipQuiz(){
  const cfg=JSON.parse(localStorage.getItem("gse.v3.flip")||"{}");

  if(quiz.length===0)return`<div><button class="back-link" onclick="S.view='student';S.flipQuizState=null;render()">${t("back")}</button><div class="student-portal" style="text-align:center"><div style="font-size:48px;margin-bottom:12px">❓</div><div style="font-size:18px;font-weight:900;color:#3C3C3C;margin-bottom:8px">Sin preguntas todavía</div><p style="color:#6B6B6B">Tu profesor aún no ha creado el quiz.</p></div></div>`;
  if(ps.done){
    const pct=Math.round(ps.score/quiz.length*100);
    const msg=pct===100?"¡Perfecto! 🌟":pct>=70?"¡Muy bien! 🎉":pct>=50?"Casi... 💪":"Repasa el material 📖";
    return`<div><div class="student-portal" style="text-align:center">
      <div style="font-size:56px;margin-bottom:10px">${pct===100?"🏆":pct>=70?"⭐":"📖"}</div>

      <div style="font-size:48px;font-weight:900;color:#1CB0F6;margin-bottom:4px">${ps.score}/${quiz.length}</div>
      <div style="font-size:14px;color:#6B6B6B;margin-bottom:20px">respuestas correctas</div>
      <div style="background:#F7F9FA;border-radius:12px;padding:16px;margin-bottom:20px;text-align:left">
        ${quiz.map((q,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #E5E5E5;font-size:13px">
          <span style="font-size:16px">${ps.answers[i]===true?"✅":"❌"}</span>
          <span style="color:#3C3C3C">${q.q}</span>
        </div>`).join("")}
      </div>
      <p style="font-size:11px;color:#AFAFAF;margin-bottom:16px">📸 Captura esta pantalla para enviársela a tu profesor</p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-blue" onclick="S.flipQuizState=null;render()">🔄 Repetir</button>
        ${cfg.reflectionQ?`<button class="btn" style="background:#CE82FF;color:#fff;border-bottom:3px solid #A050E0" onclick="S.view='flipreflection';S.reflectionAnswer='';render()">💬 Pregunta de reflexión</button>`:""}
        <button class="btn btn-white" onclick="S.view='student';S.flipQuizState=null;render()">🏠 Inicio</button>
      </div>
    </div></div>`;
  }
  const q=quiz[ps.idx];
  if(!ps.shuffled){const arr=q.opts.map((o,i)=>({text:o,correct:i===q.correct}));for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}ps.shuffled=arr;}
  const opts=ps.shuffled;
  const colors=["#1CB0F6","#58CC02","#FF9600","#CE82FF"];
  const borders=["#1899D6","#46a302","#E08200","#A560D8"];
  return`<div>
    <button class="back-link" onclick="S.view='student';S.flipQuizState=null;render()">${t("back")}</button>
    <div class="player-wrap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div>
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.2em;color:#58CC02;font-weight:900;margin-bottom:2px">Quiz de verificación · Fase 1</div>
          <div style="font-size:16px;font-weight:900;color:#3C3C3C">Comprendo · Clase Invertida</div>
        </div>
        <span class="tag tag-green">Pregunta ${ps.idx+1} / ${quiz.length}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(ps.idx/quiz.length)*100}%"></div></div>
      <div class="question-text">${q.q}</div>
      <div class="options-grid">
        ${opts.map((o,di)=>{const isC=ps.pick!=null&&o.correct;const isW=ps.pick===di&&!o.correct;const dim=ps.pick!=null&&!isC&&!isW;return`<button class="option-btn" style="background:${colors[di]};border-color:${borders[di]};color:#fff;opacity:${dim?.4:1}" onclick="fqPick(${di})" ${ps.pick!=null?"disabled":""}><span class="option-letter">${"ABCD"[di]}</span>${o.text}</button>`}).join("")}
      </div>
      ${ps.pick!=null?`<div style="text-align:center;padding:10px;border-radius:10px;background:${opts[ps.pick]?.correct?"#D7FFB8":"#FFE0E0"};color:${opts[ps.pick]?.correct?"#3C8200":"#A02020"};font-weight:900;font-size:15px;margin-top:4px">${opts[ps.pick]?.correct?"✓ ¡Correcto!":"✗ Respuesta incorrecta"}</div>`:""}
    </div>
  </div>`;
}

function fqPick(di){
  const cfg=JSON.parse(localStorage.getItem("gse.v3.flip")||"{}");
  const quiz=cfg.quiz||[];
  const ps=S.flipQuizState;
  if(!ps||ps.pick!=null)return;
  const isCorrect=ps.shuffled[di]?.correct||false;
  ps.answers[ps.idx]=isCorrect;
  ps.pick=di;
  if(isCorrect)ps.score++;
  render();
  setTimeout(()=>{ps.idx++;ps.pick=null;ps.shuffled=null;if(ps.idx>=quiz.length)ps.done=true;render()},1200);
}

function finish(score,total){
  const dur=Date.now()-S.startTime;
  const name=S.mode==="live"?S.livePlayers[S.liveIdx]:S.pName;
  S.results.unshift({id:uid(),actId:S.play.id,actTitle:S.play.title,student:name,score,total,mode:S.mode,dur,date:Date.now()});
  save();
  if(S.mode==="live"){
    S.liveScores.push({name,score,total});
    if(S.liveIdx+1<S.livePlayers.length){S.liveIdx++;S.pName=S.livePlayers[S.liveIdx];S.pState={};S.startTime=Date.now();render();return}
  }
  if(score/Math.max(1,total)>=.7)confetti();
  S.pFinished=true;render();
}

function vFinish(){
  if(S.mode==="live"){
    const sc=[...S.liveScores].sort((a,b)=>b.score-a.score);
    const podColors=["#FFD700","#C0C0C0","#CD7F32"];const heights=[140,100,80];const order=[1,0,2];

      <div style="display:flex;align-items:flex-end;justify-content:center;gap:12px;padding-top:24px">
        ${order.map(r=>{const s=sc[r];if(!s)return`<div style="width:100px"></div>`;return`<div style="display:flex;flex-direction:column;align-items:center;width:100px">

          <div style="height:${heights[r]}px;width:80px;border-radius:12px 12px 0 0;background:${podColors[r]};display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:900">#${r+1}</div>

      </div>
      <button class="btn btn-green btn-lg" style="margin-top:20px" onclick="exitPlay()">🏠 Inicio</button>
    </div>`;
  }
  const r=S.results[0];const pct=Math.round(r.score/Math.max(1,r.total)*100);
  const mins=Math.floor(r.dur/60000);const secs=Math.floor(r.dur%60000/1000);
  const stars=pct>=90?3:pct>=70?2:pct>=50?1:0;
  return`<div class="player-wrap"><div style="text-align:center;padding:20px">
    <div style="font-size:64px;margin-bottom:16px">${pct>=70?"🏆":pct>=50?"⭐":"💪"}</div>
    <div style="font-size:28px;font-weight:900;color:#58CC02;margin-bottom:8px">${pct>=90?"¡LEGENDARIO! 🌟":pct>=70?"¡Genial! 🎉":pct>=50?"Bien hecho 👍":"Sigue practicando 💪"}</div>

    <div style="background:#F7F9FA;border-radius:16px;padding:20px;max-width:360px;margin:0 auto 20px;text-align:left">

function pCat(a,ps){

  if(!ps.pool){ps.pool=cats.flatMap((c,ci)=>c.items.filter(Boolean).map(it=>({id:uid(),text:it,cat:ci}))).sort(()=>Math.random()-.5);ps.placed={};ps.sel=null}

}
function catSel(id){S.pState.sel=S.pState.sel===id?null:id;render()}
function catPlace(ci){const ps=S.pState;if(!ps.sel)return;const item=ps.pool.find(p=>p.id===ps.sel);if(!item)return;if(!ps.placed[ci])ps.placed[ci]=[];ps.placed[ci].push(item);ps.sel=null;render()}
function finCat(){const ps=S.pState;let c=0;Object.entries(ps.placed).forEach(([k,arr])=>arr.forEach(it=>{if(it.cat===Number(k))c++}));finish(c*100,ps.pool.length*100)}

function pHangman(a,ps){
  const words=(a.data.words||[]).filter(w=>w.word);
  if(!ps.idx)ps.idx=0;if(!ps.score)ps.score=0;if(!ps.guessed)ps.guessed=[];if(ps.errors===undefined)ps.errors=0;
  if(ps.idx>=words.length){finish(ps.score,words.length*100);return""}
  const word=words[ps.idx].word.toUpperCase();
  const won=word.split("").every(l=>l===" "||ps.guessed.includes(l));const lost=ps.errors>=6;
  const letters="ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split("");
  const e=Math.min(ps.errors,6);const sz=160;const cx=sz/2,cy=sz*.45;
  return`<div style="text-align:center"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span class="tag tag-orange">Errores: ${ps.errors}/6</span><span class="tag tag-green">${ps.score} pts</span></div><p style="color:#6B6B6B;font-weight:700;margin-bottom:8px">💡 ${words[ps.idx].hint||"¿Qué palabra es?"}</p><svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}" style="display:block;margin:0 auto"><rect x="10" y="${sz-12}" width="${sz-20}" height="8" rx="3" fill="#1E3A5F"/><rect x="30" y="14" width="8" height="${sz-28}" rx="3" fill="#1E3A5F"/><rect x="30" y="14" width="60" height="8" rx="3" fill="#1E3A5F"/><line x1="${cx+30}" y1="22" x2="${cx+30}" y2="35" stroke="#1E3A5F" stroke-width="3"/>${e>=1?`<circle cx="${cx+30}" cy="${cy-26}" r="13" fill="#FFE8C7" stroke="#FF9600" stroke-width="2"/>`:""} ${e>=2?`<rect x="${cx+24}" y="${cy-12}" width="12" height="36" rx="6" fill="#1E3A5F"/>`:""} ${e>=3?`<line x1="${cx+36}" y1="${cy}" x2="${cx+18}" y2="${cy+18}" stroke="#1E3A5F" stroke-width="6" stroke-linecap="round"/>`:""} ${e>=4?`<line x1="${cx+24}" y1="${cy}" x2="${cx+42}" y2="${cy+18}" stroke="#1E3A5F" stroke-width="6" stroke-linecap="round"/>`:""} ${e>=5?`<line x1="${cx+28}" y1="${cy+24}" x2="${cx+20}" y2="${cy+46}" stroke="#1E3A5F" stroke-width="6" stroke-linecap="round"/>`:""} ${e>=6?`<line x1="${cx+32}" y1="${cy+24}" x2="${cx+40}" y2="${cy+46}" stroke="#1E3A5F" stroke-width="6" stroke-linecap="round"/>`:""}</svg><div class="word-display">${word.split("").map(l=>`<div class="word-cell">${l===" "?"·":(ps.guessed.includes(l)||lost?l:"")}</div>`).join("")}</div><div class="letter-grid">${letters.map(l=>`<button class="letter-btn ${ps.guessed.includes(l)?(word.includes(l)?"good":"bad"):""}" onclick="hmGuess('${l}')" ${ps.guessed.includes(l)||won||lost?"disabled":""}>${l}</button>`).join("")}</div>${won?`<p style="color:#58CC02;font-weight:900;font-size:16px">✓ ¡Salvado!</p>`:""} ${lost?`<p style="color:#FF4B4B;font-weight:900;font-size:16px">La palabra era: ${word}</p>`:""}</div>`;
}
function hmGuess(l){const ps=S.pState;const words=(S.play.data.words||[]).filter(w=>w.word);const word=words[ps.idx].word.toUpperCase();if(ps.guessed.includes(l))return;ps.guessed.push(l);if(!word.includes(l))ps.errors++;const won=word.split("").every(c=>c===" "||ps.guessed.includes(c));const lost=ps.errors>=6;if(won)ps.score+=100;render();if(won||lost)setTimeout(()=>{ps.idx++;ps.guessed=[];ps.errors=0;if(ps.idx>=words.length)finish(ps.score,words.length*100);else render()},1300)}

function pWS(a,ps){
  const rawWords=(a.data.words||[]).filter(Boolean).map(w=>w.toUpperCase().replace(/\s+/g,""));
  const size=10;
  if(!ps.grid){
    const g=Array.from({length:size},()=>Array(size).fill(""));const place={};
    rawWords.forEach(w=>{for(let att=0;att<150;att++){const hor=Math.random()>.5;const maxR=size-(hor?1:w.length);const maxC=size-(hor?w.length:1);if(maxR<0||maxC<0)break;const r0=Math.floor(Math.random()*(maxR+1));const c0=Math.floor(Math.random()*(maxC+1));let ok=true;const cells=[];for(let i=0;i<w.length;i++){const rr=r0+(hor?0:i),cc=c0+(hor?i:0);const ch=g[rr][cc];if(ch&&ch!==w[i]){ok=false;break}cells.push({r:rr,c:cc})}if(!ok)continue;cells.forEach(({r,c},i)=>g[r][c]=w[i]);place[w]=cells;break}});
    for(let r=0;r<size;r++)for(let c=0;c<size;c++)if(!g[r][c])g[r][c]=String.fromCharCode(65+Math.floor(Math.random()*26));
    ps.grid=g;ps.place=place;ps.placed=rawWords.filter(w=>!!place[w]);ps.found=[];ps.sS=null;ps.sE=null;
  }
  const cellColors={};ps.found.forEach((w,i)=>(ps.place[w]||[]).forEach(({r,c})=>cellColors[`${r}-${c}`]=COLORS[i%COLORS.length]));
  const selCells=new Set();
  if(ps.sS&&ps.sE){const a=ps.sS,b=ps.sE;if(a.r===b.r){const[c1,c2]=a.c<=b.c?[a.c,b.c]:[b.c,a.c];for(let c=c1;c<=c2;c++)selCells.add(`${a.r}-${c}`)}else if(a.c===b.c){const[r1,r2]=a.r<=b.r?[a.r,b.r]:[b.r,a.r];for(let r=r1;r<=r2;r++)selCells.add(`${r}-${a.c}`)}}
  return`<div><div style="display:flex;justify-content:space-between;margin-bottom:10px"><span class="tag tag-green">${ps.found.length}/${ps.placed.length} palabras</span></div><div style="overflow-x:auto;text-align:center"><div class="ws-grid-wrap" style="grid-template-columns:repeat(${size},1fr)">${ps.grid.flat().map((l,idx)=>{const r=Math.floor(idx/size),c=idx%size;const key=`${r}-${c}`;const col=cellColors[key];const inSel=selCells.has(key);return`<div class="ws-cell ${inSel?"sel":""}" style="${col?`background:${col}22;border-color:${col};font-weight:900;color:#0F1B3D`:""}" onmousedown="wsS(${r},${c})" onmousemove="wsM(${r},${c})" onmouseup="wsE()" ontouchstart="wsS(${r},${c})" ontouchend="wsE()">${l}</div>`}).join("")}</div></div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px">${ps.placed.map((w,i)=>`<span class="tag" style="background:${COLORS[i%COLORS.length]}22;color:${COLORS[i%COLORS.length]};border:1px solid ${COLORS[i%COLORS.length]};${ps.found.includes(w)?"text-decoration:line-through;opacity:.5":""}">${w}</span>`).join("")}</div><p style="color:#6B6B6B;font-size:11px;margin-top:8px">Arrastra horizontal o verticalmente.</p></div>`;
}
function wsS(r,c){S.pState.sS={r,c};S.pState.sE={r,c};render()}
function wsM(r,c){if(S.pState.sS&&(r!==S.pState.sE?.r||c!==S.pState.sE?.c)){S.pState.sE={r,c};render()}}
function wsE(){const ps=S.pState;if(!ps.sS||!ps.sE){ps.sS=null;return}const a=ps.sS,b=ps.sE;let cells=[];if(a.r===b.r){const[c1,c2]=a.c<=b.c?[a.c,b.c]:[b.c,a.c];for(let c=c1;c<=c2;c++)cells.push({r:a.r,c})}else if(a.c===b.c){const[r1,r2]=a.r<=b.r?[a.r,b.r]:[b.r,a.r];for(let r=r1;r<=r2;r++)cells.push({r,c:a.c})}if(cells.length>1){const str=cells.map(p=>ps.grid[p.r][p.c]).join("");const rev=str.split("").reverse().join("");const hit=ps.placed.find(w=>!ps.found.includes(w)&&(w===str||w===rev));if(hit){ps.found.push(hit);notify(`✓ ${hit}`);if(ps.found.length===ps.placed.length)finish(ps.placed.length*100,ps.placed.length*100)}}ps.sS=null;ps.sE=null;render()}

function pCW(a,ps){
  const entries=(a.data.entries||[]).filter(e=>e.word&&e.clue);
  if(!ps.ans)ps.ans=entries.map(()=>"");
  return`<div><span class="tag tag-blue" style="margin-bottom:12px;display:inline-block">Crucigrama · ${entries.length} palabras</span>${entries.map((e,i)=>`<div class="cw-row"><span class="cw-num">${i+1}.</span><span class="cw-clue">${e.clue}</span><input class="cw-input" value="${ps.ans[i]||""}" placeholder="${e.word.length} letras" oninput="cwUpd(${i},this.value)"></div>`).join("")}<div style="text-align:center;margin-top:16px"><button class="btn btn-blue btn-lg" onclick="chkCW()">Comprobar respuestas</button></div></div>`;
}
function cwUpd(i,v){S.pState.ans[i]=v.toUpperCase()}
function chkCW(){const entries=(S.play.data.entries||[]).filter(e=>e.word&&e.clue);let sc=0;entries.forEach((e,i)=>{if((S.pState.ans[i]||"").trim().toUpperCase()===e.word.toUpperCase())sc+=100});finish(sc,entries.length*100)}

function pOrder(a,ps){
  const sents=(a.data.sentences||[]).filter(Boolean);
  if(!ps.idx)ps.idx=0;if(!ps.score)ps.score=0;
  if(ps.idx>=sents.length){finish(ps.score,sents.length*200);return""}
  if(!ps.tokens)ps.tokens=sents[ps.idx].split(/\s+/).filter(Boolean);
  if(!ps.sc)ps.sc=[...ps.tokens].sort(()=>Math.random()-.5);
  if(!ps.ord)ps.ord=[];
  return`<div style="text-align:center"><span class="tag tag-blue" style="margin-bottom:12px;display:inline-block">${ps.idx+1}/${sents.length} · ${ps.score} pts</span><div class="order-area">${ps.ord.length===0?`<span style="color:#AFAFAF;font-style:italic;font-size:13px">Toca las palabras…</span>`:""}${ps.ord.map((i,k)=>`<div class="order-placed" onclick="ordRm(${k})">${ps.sc[i]}</div>`).join("")}</div><div style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:14px">${ps.sc.map((w,i)=>`<div class="order-token ${ps.ord.includes(i)?"used":""}" onclick="ordAdd(${i})">${w}</div>`).join("")}</div><button class="btn btn-blue btn-lg" onclick="chkOrd()" ${ps.ord.length!==ps.sc.length?"disabled":""}>Comprobar</button></div>`;
}
function ordAdd(i){const ps=S.pState;if(!ps.ord.includes(i)){ps.ord.push(i);render()}}
function ordRm(k){const ps=S.pState;ps.ord.splice(k,1);render()}
function chkOrd(){const ps=S.pState;const built=ps.ord.map(i=>ps.sc[i]).join(" ");if(built===ps.tokens.join(" ")){ps.score+=200;ps.idx++;ps.ord=[];ps.tokens=null;ps.sc=null;const tot=(S.play.data.sentences||[]).filter(Boolean).length;if(ps.idx>=tot)finish(ps.score,tot*200);else render()}else notify("¡Inténtalo de nuevo!",false)}

function pRoulette(a,ps){
  if(!ps.active)ps.active=[...(a.data.options||[]).filter(Boolean)];
  if(!ps.rot)ps.rot=0;if(ps.spinning===undefined)ps.spinning=false;
  const n=ps.active.length;const sz=200;const cx=sz/2,cy=sz/2,r=sz/2-4;
  let sectors="";
  if(n>0){const step=360/n;ps.active.forEach((opt,i)=>{const s=i*step,e=(i+1)*step,mid=(s+e)/2;const sr=s*Math.PI/180,er=e*Math.PI/180;const x1=cx+r*Math.sin(sr),y1=cy-r*Math.cos(sr),x2=cx+r*Math.sin(er),y2=cy-r*Math.cos(er);const large=step>180?1:0;const lr=mid*Math.PI/180,dist=r*.65;sectors+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${COLORS[i%COLORS.length]}" stroke="#fff" stroke-width="1.5"/><text x="${cx+dist*Math.sin(lr)}" y="${cy-dist*Math.cos(lr)}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="${Math.min(11,80/n+4)}" font-weight="900" transform="rotate(${mid},${cx+dist*Math.sin(lr)},${cy-dist*Math.cos(lr)})">${opt.slice(0,8)}</text>`})}
  return`<div class="roulette-wrap"><span class="tag tag-red" style="margin-bottom:12px;display:inline-block">🎡 ${n} opciones</span><div style="position:relative;display:inline-block"><div style="position:absolute;left:50%;top:-4px;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:16px solid #0F1B3D;z-index:10"></div><svg id="rl-svg" viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}" style="display:block;border-radius:50%;border:4px solid #0F1B3D;transition:${ps.spinning?"transform 2.2s cubic-bezier(0.17,0.67,0.21,0.99)":"none"};transform:rotate(${ps.rot}deg)">${sectors}<circle cx="${cx}" cy="${cy}" r="10" fill="#fff" stroke="#0F1B3D" stroke-width="2"/></svg></div>${ps.picked?`<div style="margin-top:14px"><div style="display:inline-block;background:#FFE8C7;color:#A06400;padding:12px 24px;border-radius:14px;font-size:20px;font-weight:900;border-bottom:4px solid #FF9600;margin-bottom:12px">${ps.picked}</div><div style="display:flex;justify-content:center;gap:10px"><button class="btn btn-red" onclick="rlRm()">🗑 Eliminar</button><button class="btn btn-green" onclick="rlKeep()">✓ Siguiente</button></div></div>`:""}<div style="display:flex;justify-content:center;gap:10px;margin-top:14px"><button class="btn btn-red btn-lg" onclick="rlSpin()" ${ps.spinning||n===0?"disabled":""}>🎡 Girar</button><button class="btn btn-white" onclick="finish(${(a.data.options||[]).length-n},${(a.data.options||[]).length||1})">Terminar</button></div>${n===0?`<p style="color:#FF4B4B;font-weight:900;margin-top:8px">¡Todas eliminadas!</p>`:""}</div>`;
}
function rlSpin(){const ps=S.pState;const n=ps.active.length;if(!n||ps.spinning)return;ps.spinning=true;ps.picked=null;const wi=Math.floor(Math.random()*n);const step=360/n;const offset=360-(wi*step+step/2);const base=Math.ceil(ps.rot/360)*360;ps.rot=base+360*5+offset;render();setTimeout(()=>{ps.picked=ps.active[wi];ps.spinning=false;render()},2300)}
function rlRm(){const ps=S.pState;ps.active=ps.active.filter(o=>o!==ps.picked);ps.picked=null;ps.rot=0;render()}
function rlKeep(){S.pState.picked=null;render()}

function pMystery(a,ps){
  const boxes=a.data.boxes||[];if(!ps.opened)ps.opened=[];
  return`<div style="text-align:center"><span class="tag tag-orange" style="margin-bottom:14px;display:inline-block">🎁 ${ps.opened.length}/${boxes.length} abiertas</span><div class="mystery-grid">${boxes.map((b,i)=>`<button style="padding:24px 16px;border-radius:16px;border:none;cursor:pointer;font-size:14px;font-weight:900;text-align:center;transition:.15s;border-bottom:4px solid;background:${ps.opened.includes(i)?"#D7FFB8":"#FFE8C7"};border-color:${ps.opened.includes(i)?"#58CC02":"#FF9600"};color:${ps.opened.includes(i)?"#3C8200":"#A06400"};font-family:'Nunito',sans-serif" onclick="openBox(${i})"><div style="font-size:36px;margin-bottom:8px">${ps.opened.includes(i)?"🎉":"🎁"}</div><div>${ps.opened.includes(i)?b.r:(b.l||`Caja ${i+1}`)}</div></button>`).join("")}</div><div style="margin-top:16px"><button class="btn btn-green btn-lg" onclick="finish(${ps.opened?.length||0}*50,${boxes.length}*50)" ${(ps.opened?.length||0)===0?"disabled":""}>Ver resultados</button></div></div>`;
}
function openBox(i){const ps=S.pState;if(!ps.opened.includes(i)){ps.opened.push(i);render()}}

render();

</script>
</body>
